<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فحص جهازي</title>
  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      text-align: center;
      padding: 20px;
    }
    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
    }
    .card {
      background: #1e293b;
      margin: 15px auto;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 500px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
      text-align: left;
    }
    .card p {
      margin: 8px 0;
      font-size: 16px;
    }
    footer {
      margin-top: 20px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <h1>🔍 فحص جهازي</h1>
  <p>هنا تقدر تعرف معلومات عن جهازك:</p>
  <div class="card" id="deviceInfo">
    <p>جاري الفحص...</p>
  </div>

  <footer>⚡ تم البرمجة بواسطة أبو عساف</footer>

  <script>
    function getDeviceInfo() {
      const infoDiv = document.getElementById("deviceInfo");
      const ua = navigator.userAgent;
      const platform = navigator.platform;
      const lang = navigator.language;
      const screenRes = `${window.screen.width}x${window.screen.height}`;
      const online = navigator.onLine ? "متصل بالإنترنت" : "غير متصل";

      infoDiv.innerHTML = `
        <p><strong>المتصفح:</strong> ${navigator.appName}</p>
        <p><strong>نظام التشغيل:</strong> ${platform}</p>
        <p><strong>لغة النظام:</strong> ${lang}</p>
        <p><strong>الدقة:</strong> ${screenRes}</p>
        <p><strong>نوع الجهاز:</strong> ${/Mobi|Android/i.test(ua) ? "جوال 📱" : "كمبيوتر 💻"}</p>
        <p><strong>الحالة:</strong> ${online}</p>
        <p><strong>تفاصيل المتصفح:</strong> ${ua}</p>
      `;
    }

    getDeviceInfo();
  </script>
</body>
</html>
